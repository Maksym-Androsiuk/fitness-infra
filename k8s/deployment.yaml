apiVersion: apps/v1
kind: Deployment
metadata:
  name: wger-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wger
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0  # Забезпечує Zero Downtime
      maxSurge: 1
  template:
    metadata:
      labels:
        app: wger
    spec:
      containers:
      - name: wger
        image: us-central1-docker.pkg.dev/PROJECT_ID/fitness-app-repo/wger:latest # Placeholder
        ports:
        - containerPort: 8000
        readinessProbe: # K8s автоматично не пустить трафік, поки це не пройде
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10